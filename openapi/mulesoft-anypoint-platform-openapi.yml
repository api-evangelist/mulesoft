                    fullDomain: example_value
                    status: STARTED
                    description: A sample description.
                    region: example_value
                    muleVersion:
                      version: example_value
                      updateId: '500123'
                      endOfSupportDate: '2026-01-15'
                    workers:
                      amount: 10
                      type:
                        name: Micro
                        weight: 0.1
                        cpu: example_value
                        memory: example_value
                    properties: example_value
                    lastUpdateTime: 10
                    fileName: example_value
                    monitoringEnabled: true
                    monitoringAutoRestart: true
                    staticIPsEnabled: true
                    persistentQueues: true
                    persistentQueuesEncrypted: true
                    objectStoreV1: true
                    loggingNgEnabled: true
                    trackingSettings:
                      trackingLevel: DISABLED
                    vpnId: '500123'
                    vpnConfig:
                      vpnId: '500123'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    put:
      operationId: updateApplication
      summary: Mulesoft Update Application
      description: >-
        Updates the configuration of an existing CloudHub application. Can be
        used to change runtime version, worker configuration, properties,
        or redeploy with a new application archive.
      tags:
      - Applications
      parameters:
      - $ref: '#/components/parameters/Domain'
      - name: X-ANYPNT-ENV-ID
        in: header
        required: true
        description: The environment ID
        schema:
          type: string
          format: uuid
        example: '500123'
      - name: X-ANYPNT-ORG-ID
        in: header
        required: true
        description: The organization ID
        schema:
          type: string
          format: uuid
        example: '500123'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationUpdate'
            examples:
              UpdateapplicationRequestExample:
                summary: Default updateApplication request
                x-microcks-default: true
                value:
                  muleVersion:
                    version: example_value
                  workers:
                    amount: 10
                    type:
                      name: Micro
                      weight: 0.1
                      cpu: example_value
                      memory: example_value
                  properties: example_value
                  monitoringAutoRestart: true
                  region: example_value
                  staticIPsEnabled: true
                  loggingNgEnabled: true
                  persistentQueues: true
      responses:
        '200':
          description: Application updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
              examples:
                Updateapplication200Example:
                  summary: Default updateApplication 200 response
                  x-microcks-default: true
                  value:
                    domain: example_value
                    fullDomain: example_value
                    status: STARTED
                    description: A sample description.
                    region: example_value
                    muleVersion:
                      version: example_value
                      updateId: '500123'
                      endOfSupportDate: '2026-01-15'
                    workers:
                      amount: 10
                      type:
                        name: Micro
                        weight: 0.1
                        cpu: example_value
                        memory: example_value
                    properties: example_value
                    lastUpdateTime: 10
                    fileName: example_value
                    monitoringEnabled: true
                    monitoringAutoRestart: true
                    staticIPsEnabled: true
                    persistentQueues: true
                    persistentQueuesEncrypted: true
                    objectStoreV1: true
                    loggingNgEnabled: true
                    trackingSettings:
                      trackingLevel: DISABLED
                    vpnId: '500123'
                    vpnConfig:
                      vpnId: '500123'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deleteApplication
      summary: Mulesoft Delete Application
      description: >-
        Deletes a CloudHub application and stops all running workers. The
        application domain becomes available for reuse after deletion.
      tags:
      - Applications
      parameters:
      - $ref: '#/components/parameters/Domain'
      - name: X-ANYPNT-ENV-ID
        in: header
        required: true
        description: The environment ID
        schema:
          type: string
          format: uuid
        example: '500123'
      - name: X-ANYPNT-ORG-ID
        in: header
        required: true
        description: The organization ID
        schema:
          type: string
          format: uuid
        example: '500123'
      responses:
        '204':
          description: Application deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
