name: MuleSoft Domain Vocabulary
provider: MuleSoft
providerId: mulesoft
description: Tag-derived vocabulary for the MuleSoft API surface; sourced from openapi/ tags.
terms:
- term: Applications
  description: Manage Mule applications deployed to CloudHub, Runtime Fabric, or hybrid targets. Includes operations for deploying,
    starting, stopping, and monitoring application instances.
- term: Environments
  description: Manage deployment environments within an organization. Environments provide isolated contexts for deploying
    and running Mule applications, such as Design, Sandbox, and Production.
- term: Organizations
  description: Manage organizations and business groups within the Anypoint Platform. Organizations are the top-level containers
    for all platform resources including environments, users, and applications.
