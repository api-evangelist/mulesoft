naftiko: "1.0.0-alpha1"

info:
  name: MuleSoft Anypoint Accounts
  description: Organizations and environments via the Anypoint Platform Accounts API
  version: 1.0.0

binds:
  - name: MULESOFT_ACCESS_TOKEN
    env: MULESOFT_ACCESS_TOKEN

capability:
  consumes:
    - namespace: accounts
      type: http
      baseUri: "https://anypoint.mulesoft.com/accounts/api"
      authentication:
        type: bearer
        token: "{{MULESOFT_ACCESS_TOKEN}}"
      resources:
        - name: organizations
          path: "/organizations"
          operations:
            - name: listOrganizations
              method: GET
            - name: createOrganization
              method: POST

        - name: organization
          path: "/organizations/{orgId}"
          operations:
            - name: getOrganization
              method: GET
            - name: updateOrganization
              method: PUT
            - name: deleteOrganization
              method: DELETE

        - name: environments
          path: "/organizations/{orgId}/environments"
          operations:
            - name: listEnvironments
              method: GET
            - name: createEnvironment
              method: POST

        - name: environment
          path: "/organizations/{orgId}/environments/{envId}"
          operations:
            - name: getEnvironment
              method: GET
            - name: updateEnvironment
              method: PUT
            - name: deleteEnvironment
              method: DELETE

  exposes:
    - type: rest
      port: 8110
      namespace: mulesoft-accounts-rest
      resources:
        - path: "/organizations"
          name: organizations
          label: "List Organizations"
          description: "List all MuleSoft Anypoint organizations"
          operations:
            - method: GET
              call: accounts.listOrganizations
              outputParameters:
                - type: array
                  mapping: "$."
                  items:
                    type: object

        - path: "/organizations/{orgId}"
          name: organization
          label: "Get Organization"
          description: "Get details for a specific organization"
          operations:
            - method: GET
              call: accounts.getOrganization
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                  description: "Organization ID"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: "/organizations/{orgId}/environments"
          name: environments
          label: "List Environments"
          description: "List environments within an organization"
          operations:
            - method: GET
              call: accounts.listEnvironments
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                  description: "Organization ID"
              outputParameters:
                - type: array
                  mapping: "$."
                  items:
                    type: object

    - type: mcp
      address: "0.0.0.0"
      port: 9110
      namespace: mulesoft-accounts
      description: "MuleSoft Anypoint organization and environment management tools"
      tools:
        - name: list-organizations
          description: "List all MuleSoft Anypoint organizations accessible to the authenticated user"
          hints:
            readOnly: true
          call: accounts.listOrganizations
          outputParameters:
            - type: array
              mapping: "$."
              items:
                type: object

        - name: get-organization
          description: "Get details for a specific MuleSoft Anypoint organization"
          hints:
            readOnly: true
          call: accounts.getOrganization
          inputParameters:
            - name: orgId
              type: string
              required: true
              description: "Organization ID"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-environments
          description: "List all environments within a MuleSoft Anypoint organization"
          hints:
            readOnly: true
          call: accounts.listEnvironments
          inputParameters:
            - name: orgId
              type: string
              required: true
              description: "Organization ID"
          outputParameters:
            - type: array
              mapping: "$."
              items:
                type: object

        - name: get-environment
          description: "Get details for a specific environment within an organization"
          hints:
            readOnly: true
          call: accounts.getEnvironment
          inputParameters:
            - name: orgId
              type: string
              required: true
              description: "Organization ID"
            - name: envId
              type: string
              required: true
              description: "Environment ID"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-environment
          description: "Create a new environment within a MuleSoft Anypoint organization"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: accounts.createEnvironment
          inputParameters:
            - name: orgId
              type: string
              required: true
              description: "Organization ID"
            - name: body
              type: object
              required: true
              description: "Environment definition"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-environment
          description: "Delete an environment from a MuleSoft Anypoint organization"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: accounts.deleteEnvironment
          inputParameters:
            - name: orgId
              type: string
              required: true
              description: "Organization ID"
            - name: envId
              type: string
              required: true
              description: "Environment ID"
          outputParameters:
            - type: object
              mapping: "$."
