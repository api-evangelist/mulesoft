specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: MuleSoft
providerId: mulesoft
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Integration Platform
  - API Management
  - iPaaS
  - Anypoint Platform
description: MuleSoft (a Salesforce company) sells the Anypoint Platform via three primary subscription
  packages — Integration Starter, Integration Advanced, and an API Management Solution package — sized
  by Mule Flow / Mule Message capacity (vCores). Salesforce does not publish list prices on the public
  pricing page; quotes come through the Salesforce sales team. Support tiers Gold, Platinum, and Titanium
  layer onto each package, and add-on modules (API Manager, Anypoint Monitoring, Anypoint Security, Anypoint
  DataGraph) extend it. Industry coverage of public reports cites "from approximately $1,250 / vCore /
  month" as a frequently-quoted starting Gold-tier figure, but MuleSoft itself does not publish that
  number, so it is captured as a directional reference rather than list pricing.
sources:
  - https://www.mulesoft.com/anypoint-pricing
  - https://www.salesforce.com/mulesoft/anypoint-platform/pricing/
  - https://docs.mulesoft.com/general/pricing
plans:
  - id: mulesoft-integration-starter
    name: Anypoint Integration Starter
    type: subscription
    description: Entry integration package for the Anypoint Platform, sized by Mule Flow / Mule Message
      capacity. Bundled with the Premier Success Plan (24x7x365 support, 1-hour business-stop response).
    entries:
      - label: Subscription (capacity-based)
        name: integration_starter
        type: subscription
        metric: vCore
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Anypoint Studio
      - name: CloudHub / Runtime Fabric / Hybrid
      - name: Bundled Premier Success Plan
      - name: Mule Flow / Mule Message capacity sizing
  - id: mulesoft-integration-advanced
    name: Anypoint Integration Advanced
    type: subscription
    description: Production-grade integration package adding higher capacity, additional environments,
      and broader connectivity. Eligible for upgrade to the Signature Success Plan (15-minute business-stop
      response, designated CSM).
    entries:
      - label: Subscription (capacity-based)
        name: integration_advanced
        type: subscription
        metric: vCore
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: All Integration Starter capabilities
      - name: Higher Mule Flow / Mule Message capacity
      - name: Additional environments
      - name: Bundled Premier Success Plan (Signature upgrade available)
  - id: mulesoft-api-management-solution
    name: API Management Solution
    type: subscription
    description: API-management-only package for organizations standing up API governance, security, and
      reuse without the integration runtime. Can be combined with an Integration package later.
    entries:
      - label: Subscription
        name: api_management
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: API Manager
      - name: Anypoint Exchange
      - name: Flex Gateway
      - name: API governance and policies
  - id: mulesoft-addons
    name: Anypoint Add-Ons
    type: subscription
    description: Optional add-on modules layered onto an Integration or API Management package.
    entries:
      - label: API Manager add-on
        name: api_manager_addon
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Anypoint Monitoring
        name: monitoring_addon
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Anypoint Security
        name: security_addon
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Anypoint DataGraph
        name: datagraph_addon
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
