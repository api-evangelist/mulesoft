aid: mulesoft
name: MuleSoft
description: >-
  MuleSoft Anypoint Platform is an enterprise integration and API management
  platform offering an API gateway, design center, exchange marketplace,
  and monitoring for hybrid deployments connecting applications and data.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - API Gateway
  - API Management
  - Enterprise
  - Integration
url: >-
  https://raw.githubusercontent.com/api-evangelist/mulesoft/refs/heads/main/apis.yml
created: '2026-03-18'
modified: '2026-03-18'
specificationVersion: '0.19'
apis:
  - aid: mulesoft:mulesoft
    name: MuleSoft Anypoint Platform
    description: >-
      MuleSoft Anypoint Platform unifies API management with integration,
      providing a complete solution to connect any application, data source,
      or device with reusable APIs and integrations.
    humanURL: https://www.mulesoft.com/platform/api
    tags:
      - API Gateway
      - API Management
      - Enterprise
    properties:
      - type: Documentation
        url: https://docs.mulesoft.com/
      - type: Getting Started
        url: https://docs.mulesoft.com/general/
  - aid: mulesoft:mulesoft-anypoint-platform-api
    name: MuleSoft Anypoint Platform Management API
    description: >-
      The Anypoint Platform Management API provides programmatic access to
      manage organizations, business groups, environments, and users within
      the MuleSoft Anypoint Platform. It enables automation of platform
      administration tasks including configuring access management, managing
      connected applications, and controlling role-based access control across
      the platform.
    humanURL: https://docs.mulesoft.com/access-management/
    baseURL: https://anypoint.mulesoft.com
    tags:
      - API Management
      - Administration
      - REST
      - Enterprise
    properties:
      - type: Documentation
        url: https://docs.mulesoft.com/access-management/
      - type: Reference
        url: https://anypoint.mulesoft.com/exchange/portals/anypoint-platform/
      - type: Authentication
        url: https://docs.mulesoft.com/access-management/connected-apps-overview
      - type: OpenAPI
        url: openapi/mulesoft-anypoint-platform-openapi.yml
      - type: JSONSchema
        url: json-schema/mulesoft-application-schema.json
      - type: JSON-LD
        url: json-ld/mulesoft-context.jsonld
  - aid: mulesoft:mulesoft-anypoint-exchange-api
    name: MuleSoft Anypoint Exchange API
    description: >-
      The Anypoint Exchange API provides programmatic access to MuleSoft's
      asset marketplace, enabling discovery, publishing, and management of
      reusable integration assets including APIs, connectors, templates,
      examples, and custom pages. It allows organizations to automate asset
      lifecycle management and promote API reuse across teams.
    humanURL: https://docs.mulesoft.com/exchange/
    baseURL: https://anypoint.mulesoft.com/exchange/api/v2
    tags:
      - API Catalog
      - Marketplace
      - Asset Management
      - Enterprise
    properties:
      - type: Documentation
        url: https://docs.mulesoft.com/exchange/
      - type: Reference
        url: https://anypoint.mulesoft.com/exchange/portals/anypoint-platform/f1e97bc6-315a-4490-82a7-23abe036327a.anypoint-platform/exchange-experience-api/
      - type: Getting Started
        url: https://docs.mulesoft.com/exchange/to-publish-assets-maven
  - aid: mulesoft:mulesoft-anypoint-runtime-manager-api
    name: MuleSoft Anypoint Runtime Manager API
    description: >-
      The Anypoint Runtime Manager API provides programmatic control over
      Mule application deployments across CloudHub, Runtime Fabric, and
      hybrid deployment targets. It enables CI/CD automation for deploying,
      updating, starting, stopping, and monitoring Mule applications and
      their runtime environments.
    humanURL: https://docs.mulesoft.com/runtime-manager/
    baseURL: https://anypoint.mulesoft.com/cloudhub/api
    tags:
      - Runtime Manager
      - Deployment
      - CloudHub
      - CI/CD
    properties:
      - type: Documentation
        url: https://docs.mulesoft.com/runtime-manager/
      - type: Reference
        url: https://docs.mulesoft.com/runtime-manager/cloudhub-api
      - type: Getting Started
        url: https://docs.mulesoft.com/runtime-manager/deploying-to-cloudhub
  - aid: mulesoft:mulesoft-anypoint-mq-api
    name: MuleSoft Anypoint MQ API
    description: >-
      The Anypoint MQ API provides a cloud messaging service built on the
      Anypoint Platform for asynchronous messaging between Mule applications
      and other systems. It supports queues, exchanges, and dead-letter queues
      for reliable message delivery and decoupled integration patterns.
    humanURL: https://docs.mulesoft.com/mq/
    baseURL: https://anypoint.mulesoft.com/mq/stats/api/v1
    tags:
      - Messaging
      - Async
      - Queue
      - Cloud
    properties:
      - type: Documentation
        url: https://docs.mulesoft.com/mq/
      - type: Reference
        url: https://docs.mulesoft.com/mq/mq-apis
      - type: Getting Started
        url: https://docs.mulesoft.com/mq/mq-tutorial
  - aid: mulesoft:mulesoft-anypoint-design-center-api
    name: MuleSoft Anypoint Design Center API
    description: >-
      The Anypoint Design Center API provides access to the MuleSoft web-based
      API design environment for creating and editing API specifications in
      RAML and OAS formats. It supports project management, file operations,
      and publishing designed APIs to Anypoint Exchange for reuse across
      the organization.
    humanURL: https://docs.mulesoft.com/design-center/
    baseURL: https://anypoint.mulesoft.com/designcenter/api-designer
    tags:
      - API Design
      - RAML
      - OpenAPI
      - Design Center
    properties:
      - type: Documentation
        url: https://docs.mulesoft.com/design-center/
      - type: Getting Started
        url: https://docs.mulesoft.com/design-center/design-create-publish-api-specs
