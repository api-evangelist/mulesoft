specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: MuleSoft
providerId: mulesoft
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - API Management
  - Integration Platform
  - Anypoint Platform
description: 'FOCUS-aligned FinOps for MuleSoft Anypoint Platform: capacity-based subscription billing
  measured in Mule Flow / Mule Message capacity (vCores), with a layered support tier (Gold / Platinum
  / Titanium) and optional add-on modules. Invoiced by Salesforce Inc. as the publisher; consumption observability
  comes from the Anypoint Usage Reports.'
sources:
  - https://www.mulesoft.com/anypoint-pricing
  - https://www.salesforce.com/mulesoft/anypoint-platform/pricing/
  - https://docs.mulesoft.com/general/pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Salesforce, Inc.
serviceCategory: Integration Platform / API Management
billingModel:
  pricingCategory: Capacity-Based Subscription + Add-Ons
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
    - Tax
focusColumns:
  ServiceName: MuleSoft Anypoint Platform
  ServiceCategory: Integration Platform / API Management
  ProviderName: MuleSoft
  PublisherName: Salesforce, Inc.
  InvoiceIssuerName: Salesforce, Inc.
  BillingCurrency: USD
meters:
  - name: vcore_capacity
    unit: vCore
    aggregation: max
    dimensions:
      - environment
      - region
      - runtime
  - name: mule_flows
    unit: flow
    aggregation: max
    dimensions:
      - api
      - environment
  - name: mule_messages
    unit: message
    aggregation: sum
    dimensions:
      - api
      - environment
      - runtime
  - name: api_calls
    unit: request
    aggregation: sum
    dimensions:
      - api
      - environment
      - client_application
  - name: addon_seats
    unit: month
    aggregation: max
    dimensions:
      - addon
principles:
  - name: Visibility
    description: Use Anypoint Usage Reports for vCore / flow / message consumption against the contracted
      capacity; expose API Manager X-Ratelimit-* headers to client teams for self-service awareness.
  - name: Allocation
    description: Tag APIs and Mule applications with consuming line-of-business, environment, and product
      owner; aggregate Anypoint Usage Reports by these tags for chargeback.
  - name: Optimization
    description: Right-size vCore capacity per environment, prune low-throughput APIs, lean on Flex Gateway
      replicas before adding capacity, and consolidate add-ons (Monitoring, Security, DataGraph) only
      where the LOB benefits.
  - name: Accountability
    description: The platform owner runs renewal sizing against Anypoint Usage Reports; LOB API owners
      own their per-API throughput SLAs and Rate-Limiting SLA contract definitions; procurement aligns
      add-on renewals with the master Salesforce contract.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
